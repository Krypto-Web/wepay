<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surf & Earn — WePay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="wp-nav"></div>

<div class="wp-container wp-page">
  <h2>🌊 Surf & Earn</h2>
  <p class="muted">Tap "Start Surfing" — it opens in a new tab. Browse for the full timer, then come back and tap the same button again to claim.</p>

  <div class="wp-grid cols-3 mt-24">
    <div class="stat"><div class="label">Wallet Balance</div><div class="value accent" id="balance">$0.00</div></div>
    <div class="stat"><div class="label">Surfed Today</div><div class="value" id="countToday">0 / 100</div></div>
    <div class="stat"><div class="label">Earned Today</div><div class="value" id="earnedToday">$0.00</div></div>
  </div>

  <div id="wp-alerts"></div>

  <div class="wp-grid cols-3 mt-24" id="siteGrid">
    <p class="muted">Loading sites…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>
let sites = [], claimedToday = new Set(), pending = {};
let sharedSiteUrl = 'https://example.com';

(async function init(){
  await requireAuth();
  renderNav('surf');
  const { data: settings } = await sb.from('site_settings').select('surf_site_url').eq('id', 1).single();
  if(settings) sharedSiteUrl = settings.surf_site_url;
  await refreshStats();
  await loadSites();
})();

async function refreshStats(){
  const profile = await getMyProfile();
  document.getElementById('balance').textContent = fmtUSD(profile.wallet_balance);

  const { data: sessions } = await sb.from('click_sessions')
    .select('item_id, status')
    .eq('item_type', 'surf').eq('claim_date', new Date().toISOString().slice(0,10));
  claimedToday = new Set((sessions||[]).filter(s=>s.status==='claimed').map(s=>s.item_id));
  document.getElementById('countToday').textContent = `${(sessions||[]).length} / 100`;

  const start = new Date(); start.setHours(0,0,0,0);
  const { data: txs } = await sb.from('wallet_transactions').select('amount').eq('type','surf_reward').gte('created_at', start.toISOString());
  document.getElementById('earnedToday').textContent = fmtUSD((txs||[]).reduce((s,t)=>s+Number(t.amount),0));
}

async function loadSites(){
  const { data, error } = await sb.from('surf_sites').select('*').eq('is_active', true).order('reward');
  const grid = document.getElementById('siteGrid');
  if(error || !data || data.length === 0){ grid.innerHTML = '<p class="muted">No sites available right now — check back later.</p>'; return; }
  sites = data;
  grid.innerHTML = sites.map(s => renderCard(s)).join('');
}

function renderCard(site){
  const done = claimedToday.has(site.id);
  const isPending = !!pending[site.id];
  return `
    <div class="item ${done ? 'is-claimed' : ''}" id="card-${site.id}">
      <div class="item-content">
        <span class="badge ${isPending ? 'pending' : ''}">${isPending ? 'Waiting for you to return' : site.duration_seconds + 's browse'}</span>
        <div style="font-size:24px;">${site.icon || '🌐'}</div>
        <h3 style="margin:0;">${site.title}</h3>
        <p class="muted" style="font-size:13px; margin:0;">${site.subtitle || ''}</p>
        <div class="reward">+$${Number(site.reward).toFixed(2)}</div>
        <button class="btn ${done ? 'btn-outline' : 'btn-primary'}" ${done ? 'disabled' : ''}
          onclick="handleSiteClick('${site.id}')" id="btn-${site.id}">
          ${done ? 'Come back tomorrow' : (isPending ? 'Back — Claim Now' : 'Start Surfing')}
        </button>
      </div>
    </div>`;
}

async function handleSiteClick(siteId){
  if(pending[siteId]){
    await claimSurf(siteId);
  } else {
    await startSurf(siteId);
  }
}

async function startSurf(siteId){
  const btn = document.getElementById(`btn-${siteId}`);
  btn.disabled = true;
  const { data: sessionId, error } = await sb.rpc('start_click_session', { p_item_type: 'surf', p_item_id: siteId });
  btn.disabled = false;
  if(error){ showAlert(error.message.includes('daily limit') ? 'Daily surf limit reached for today.' : error.message, 'warning'); return; }

  const site = sites.find(s => s.id === siteId);
  window.open(sharedSiteUrl, '_blank');
  pending[siteId] = { sessionId, startTime: Date.now(), requiredSeconds: site.duration_seconds };

  showAlert(`Site opened: <b>${site.title}</b>! Browse there for ${site.duration_seconds}s, then come back here and tap the button again.`, 'success');
  document.getElementById(`card-${siteId}`).outerHTML = renderCard(site);
}

async function claimSurf(siteId){
  const btn = document.getElementById(`btn-${siteId}`);
  btn.disabled = true; btn.textContent = 'Checking…';
  const session = pending[siteId];
  const { data: reward, error } = await sb.rpc('claim_click_session', { p_session_id: session.sessionId });

  if(error){
    if(error.message.includes('timer not finished')){
      const elapsed = Math.floor((Date.now() - session.startTime)/1000);
      const remaining = Math.max(1, session.requiredSeconds - elapsed);
      showAlert(`You came back too early! Go back to the site and stay for ${remaining} more second${remaining===1?'':'s'}.`, 'warning');
    } else {
      showAlert(error.message, 'warning');
    }
    btn.disabled = false; btn.textContent = "I'm back — Claim";
    return;
  }

  showAlert(`Reward claimed: +$${Number(reward).toFixed(2)} 🎉`, 'success');
  delete pending[siteId];
  claimedToday.add(siteId);
  document.getElementById(`card-${siteId}`).outerHTML = renderCard(sites.find(s=>s.id===siteId));
  refreshStats();
}
</script>
</body>
</html>
