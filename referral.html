<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referrals — WePay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
   <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍👨‍👦</text></svg>">
</head>
<body>
<div id="wp-nav"></div>

<div class="wp-container wp-page">
  <h2>🔗 Refer & Earn</h2>
  <p class="muted">Share your link. You earn a bonus every time someone signs up through it.</p>

  <div class="card mt-24">
    <label>Your referral link</label>
    <div style="display:flex; gap:8px;">
      <input type="text" id="refLink" readonly>
      <button class="btn btn-primary" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <div class="wp-grid cols-2 mt-24">
    <div class="stat"><div class="label">Total Referrals</div><div class="value" id="refCount">0</div></div>
    <div class="stat"><div class="label">Total Referral Earnings</div><div class="value accent" id="refEarnings">$0.00</div></div>
  </div>

  <div class="card mt-24">
    <h3>Your Referrals</h3>
    <table>
      <thead><tr><th>Name</th><th>Joined</th></tr></thead>
      <tbody id="refBody"><tr><td colspan="2" class="muted">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>
(async function init(){
  const user = await requireAuth();
  renderNav('referral');
  const profile = await getMyProfile();
  document.getElementById('refLink').value = `${window.location.origin}/register?ref=${profile.referral_code}`;

  const { data: refs } = await sb.from('referrals').select('referred_id, created_at, profiles!referrals_referred_id_fkey(full_name)');
  document.getElementById('refCount').textContent = (refs||[]).length;

  const { data: txs } = await sb.from('wallet_transactions').select('amount').eq('type','referral_bonus');
  document.getElementById('refEarnings').textContent = fmtUSD((txs||[]).reduce((s,t)=>s+Number(t.amount),0));

  const tbody = document.getElementById('refBody');
  if(!refs || refs.length === 0){ tbody.innerHTML = '<tr><td colspan="2" class="muted">No referrals yet — share your link!</td></tr>'; return; }
  tbody.innerHTML = refs.map(r => `<tr><td>${r.profiles?.full_name || 'A new user'}</td><td>${new Date(r.created_at).toLocaleDateString()}</td></tr>`).join('');
})();

function copyLink(){
  const el = document.getElementById('refLink');
  el.select();
  navigator.clipboard.writeText(el.value);
  toast('Link copied!');
}
</script>
</body>
</html>
